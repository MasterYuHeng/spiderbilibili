global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: spiderbilibili-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
